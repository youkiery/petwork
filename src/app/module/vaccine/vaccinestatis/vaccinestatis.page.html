<ion-header *ngIf="rest.isready">
  <ion-toolbar color="success">
    <ion-button color="secondary" fill="solid" size="small" (click)="rest.back()">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="rest.isready">
  <ion-segment [(ngModel)]="segment">
    <ion-segment-button value="vaccine">
      <ion-label>
        Vaccine
        <ion-badge color="danger"> {{checkvaccine()}} </ion-badge>
      </ion-label>
    </ion-segment-button>
    <ion-segment-button value="usg">
      <ion-label>
        Siêu âm
        <ion-badge color="danger"> {{checkusg()}} </ion-badge>
      </ion-label>
    </ion-segment-button>
  </ion-segment>

  <div *ngIf="segment == 'vaccine'">
    <span *ngFor="let item of list">
      <div class="stl-card" *ngIf="item.uncall.length || item.vaccine.length">
        <div class="col-xs-6">
          {{item.name}}
        </div>
        <div class="col-xs-6">
          <div> Chưa gọi: <span class="pinky"> {{item.uncall.length}} </span> </div>
          <div> Chưa xác nhận: <span class="pinky"> {{item.vaccine.length}} </span> </div>
        </div>
      </div>
    </span>
  </div>

  <div *ngIf="segment == 'usg'">
    <span *ngFor="let item of list">
      <div class="stl-card"
        *ngIf="item.usg.length || item.prog.length || item.birth.length || item.unbirth.length">
        <div class="col-xs-6">
          {{item.name}}
        </div>
        <div class="col-xs-6">
          <div> Chưa sinh: <span class="pinky"> {{item.unbirth.length}} </span> </div>
          <div> Đã sinh: <span class="pinky"> {{item.birth.length}} </span> </div>
          <div> Không thai: <span class="pinky"> {{item.prog.length}} </span> </div>
          <div> Chưa xác nhận: <span class="pinky"> {{item.usg.length}} </span> </div>
        </div>
      </div>
    </span>
  </div>
</ion-content>
