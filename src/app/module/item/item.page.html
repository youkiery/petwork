<ion-header *ngIf="rest.isready">
  <ion-toolbar color="success">
    <ion-title style="text-align: center;">
      THANHXUANPET
    </ion-title>

    <ion-buttons slot="start">
      <ion-img src="assets/image/logo.png" class="logo" (click)="rest.root()"></ion-img>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="rest.isready">
  <!-- <ion-fab vertical="bottom" horizontal="end" slot="fixed" (click)="rest.navCtrl.navigateForward('gopy')">
    <ion-fab-button>
      Góp ý
    </ion-fab-button>
  </ion-fab> -->
  <ion-refresher slot="fixed" (ionRefresh)="reload($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-item>
    <ion-label position="stacked"> Tìm kiếm tên hàng hóa </ion-label>
    <ion-input [(ngModel)]="rest.item.keyword" (ionChange)="filter()"></ion-input>
  </ion-item>

  <!-- <ion-card>
    <ion-card-content>
      Hàng sắp hết: {{rest.item.purchase}}
      <ion-button size="small" color="secondary" (click)="purchase()"> <ion-icon name="information-circle-outline"></ion-icon> </ion-button> <br>
      Hàng cần chuyển: {{rest.item.transfer}}
      <ion-button size="small" color="secondary" (click)="transfer()"> <ion-icon name="information-circle-outline"></ion-icon> </ion-button> <br>
      Hàng sắp hết hạn: {{rest.item.expired}}
      <ion-button size="small" color="secondary" (click)="expired()"> <ion-icon name="information-circle-outline"></ion-icon> </ion-button> <br>
    </ion-card-content>
  </ion-card> -->

  <div class="stl-card" *ngFor="let index of rest.item.i">
    Mã hàng: {{rest.item.list[index].code}} <br>
    Tên hàng: {{rest.item.list[index].name}} <br>
    Tồn kho: {{rest.item.list[index].shop}} <img src="/assets/icon/shop-xs.png">, {{rest.item.list[index].storage}} <img src="/assets/icon/storage-xs.png"> <br>
    Vị trí: <div class="pos" *ngFor="let pos of rest.item.list[index].position" (click)="view(pos.id)"> {{pos.name}} </div>
    <img *ngIf="rest.config.item > 1" class="right icon" src="/assets/icon/update.png" (click)="updateItem(index)">
    <img *ngIf="rest.config.item > 1" class="right icon" src="/assets/icon/delete.png" (click)="removeItem(rest.item.list[index].id)">
  </div>
</ion-content>

<ion-toolbar>
  <ion-tabs>
    <ion-tab-bar>
      <ion-tab-button (click)="rest.root()">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <ion-label> Trở về </ion-label>
      </ion-tab-button>

      <ion-tab-button (click)="insertItem()">
        <ion-icon name="add-circle-outline"></ion-icon>
        <ion-label> Thêm hàng hóa </ion-label>
      </ion-tab-button>

      <ion-tab-button (click)="insertExpire()">
        <ion-icon name="add-circle-outline"></ion-icon>
        <ion-label> Thêm HSD </ion-label>
      </ion-tab-button>

      <ion-tab-button (click)="position()">
        <ion-icon name="stats-chart-outline"></ion-icon>
        <ion-label> Vị trí </ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-toolbar>
