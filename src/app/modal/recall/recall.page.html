<ion-toolbar color="success">
  <ion-button color="light" fill="clear" (click)="rest.navCtrl.pop()">
    <ion-icon name="chevron-back-outline"></ion-icon>
  </ion-button>
</ion-toolbar>

<ion-content>
  <div *ngIf="rest.action == 'vaccine'">
    <div class="stl-card" *ngFor="let item of rest.data.vaccine.old; let i = index">
      <div>
        Vaccine: {{item.disease}} <br>
        Tái chủng: {{item.calltime}} <br>
        Ghi chú: {{item.note}} <br>
        <span *ngIf="item.called"> Gọi nhắc cuối: {{item.called}} </span>
      </div>
      <img src="/assets/icon/done.png" (click)="done(i)">
    </div>
  </div>

  <div *ngIf="rest.action == 'usg'">
    <div class="stl-card" *ngFor="let item of rest.data.usg.old; let i = index">
      <div>
        Siêu âm lại: {{item.calltime}} <br>
        Thai dự kiến: {{item.number}} <br>
        Ghi chú: {{item.note}} <br>
        <span *ngIf="item.called"> Gọi nhắc cuối: {{item.called}} </span>
      </div>
      <img src="/assets/icon/done.png" (click)="done(i)">
    </div>
  </div>
</ion-content>
