<ion-header>
  <ion-toolbar color="success">
    <ion-button slot="start" color="secondary" fill="solid" size="small" (click)="rest.back()">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="rest.isready">
  <div class="upperline" *ngFor="let item of rest.notification" (click)="navi(item.module)">
    {{item.content}}
    <span class="time"> {{time.timetodate(item.time * 1000)}} </span>
  </div>
</ion-content>
