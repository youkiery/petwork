<ion-header>
  <ion-toolbar color="success">
    <ion-title style="text-align: center;">
      THANHXUANPET
    </ion-title>
    
    <ion-buttons slot="start">
      <ion-img src="assets/image/logo.png" class="logo" (click)="rest.navCtrl.navigateRoot('home')"></ion-img>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="rest.isready">
  <ion-fab vertical="bottom" horizontal="end" slot="fixed" (click)="insert()">
    <ion-fab-button>
      Thêm
    </ion-fab-button>
  </ion-fab>

  <div class="stl-card white" *ngFor="let user of rest.admin.list; let i = index">
    Tài khoản: {{user.username}} <br>
    Họ tên: {{user.fullname}} <br>
    <img class="icon" src="/assets/icon/update.png" (click)="detail(i)">
    <img class="icon" src="/assets/icon/delete.png" (click)="remove(user.userid)">
  </div>
</ion-content>

<ion-toolbar>
  <ion-tabs>
    <ion-tab-bar>
      <ion-tab-button (click)="rest.back()">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <ion-label> Trở về </ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-toolbar>
